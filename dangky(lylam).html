<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
<div class="container">
    <div class="auth-box">
        <h1 class="title">Event Account</h1>
        <!-- Tabs -->
        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Đăng nhập</div>
            <div class="tab" onclick="switchTab('register')">Đăng ký</div>
        </div>
        <!-- LOGIN -->
        <form id="login" class="form active">
            <input type="text" placeholder="Email / SĐT">
            <input type="password" placeholder="Mật khẩu">
            <button>Đăng nhập</button>
        </form>
        <!-- REGISTER -->
        <form id="register" class="form">
            <input type="text" placeholder="Họ và tên">
            <input type="text" placeholder="Email / SĐT">
            <input type="password" placeholder="Mật khẩu">
            <input type="password" placeholder="Xác nhận mật khẩu">
            <button>Đăng ký</button>
        </form>
        <!-- Divider -->
        <div class="divider">
            Hoặc</div>
         <!-- Google Login -->
        <div id="g_id_onload"
           data-client_id="oauth-client-id-493216"
         data-callback="handleCredentialResponse">
        </div>
        <div class="g_id_signin" data-type="standard"></div>
    </div>
    <!-- Màn hình sau khi đăng nhập -->
    <div id="home" style="display:none; text-align:center;">
    <h2>Xin chào <span id="username"></span>👋</h2>
    <p>Bạn đã đăng nhập thành công</p>
    <button onclick="logout()">Đăng xuất</button>
</div>
</div>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="dki.js"></script>
</body>
</html>
