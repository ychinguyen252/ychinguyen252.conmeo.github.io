<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
<div class="container">
    <div class="form-box" id="loginBox">
        <h2>Đăng nhập</h2>

        <form id="loginForm">
            <div class="input-group">
                <label>Email</label>
                <input type="email" required>
            </div>
            
            <div class="input-group">
                <label for="password">Mật khẩu:</label>
                <input type="password" id="password" required>
            </div>

            <button type="submit" class="btn">Đăng nhập</button>

            <div class="divider">Hoặc</div>

            <button type="button" class="google-btn">
                <img src="https://img.icons8.com/color/16/google-logo.png">
                Đăng nhập với Google
            </button>

            <p>Chưa có tài khoản? <a href="register.html">Đăng ký</a></p>
        </form>
    </div>

    <div class="form-box" id="successBox" style="display: none; text-align: center;">
        <h2>Thành công!</h2>
        <p class="chuyentrang">🎉 Chúc mừng bạn đăng nhập thành công!</p>
        <button type="button" class="btn" id="logoutBtn" >Đăng xuất</button>
    </div>
</div>

<script src="dki.js"></script>
</body>
</html>
