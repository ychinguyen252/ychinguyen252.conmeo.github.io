<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Events Vietnam</title>

<link rel="stylesheet" href="CSS/style1.css">
<link href="https://fonts.googleapis.com/css2?family=Work+Sans&display=swap" rel="stylesheet">
</head>

<body>

<!-- NAV -->
<header class="nav">
    <div class="logo">EVENTS</div>

    <div class="menu">
        <a class="active">Trang chủ</a>
        <a>Hoạt động</a>
        <a>Dịch vụ</a>
        <a>Liên hệ</a>
    </div>

    <div class="nav-right">
        <input type="text" placeholder="Search...">
        <a class="btn">Login</a>
    </div>
</header>

<!-- HERO -->
<section class="hero">
    <div class="hero-left">
        <h1>Khám phá sự kiện hot 🔥</h1>
        <p>Khám phá – trải nghiệm – kết nối</p>
        <button>Xem ngay</button>
    </div>

    <div class="hero-right">
        <img src="https://picsum.photos/500/300">
    </div>
</section>

<!-- CATEGORY -->
<section class="category">
    <button class="active">Tất cả</button>
    <button>Workshop</button>
    <button>Thể thao</button>
    <button>Nghệ thuật</button>
    <button>Khác</button>
</section>

<!-- FEATURED -->
<section class="section">
    <h2>Sự kiện nổi bật</h2>

    <div class="grid-4">
        <div class="card">Event 1</div>
        <div class="card">Event 2</div>
        <div class="card">Event 3</div>
        <div class="card">Event 4</div>
    </div>
</section>

<!-- TOP -->
<section class="section">
    <h2>Top xếp hạng</h2>

    <div class="grid-3">
        <div class="top-card">Top 1</div>
        <div class="top-card">Top 2</div>
        <div class="top-card">Top 3</div>
    </div>
</section>

<!-- BANNER -->
<section class="banner">
    Banner giới thiệu
</section>

<!-- SHOW -->
<section class="section">
    <h2>Các loại show</h2>

    <div class="grid-4">
        <div class="card">Show 1</div>
        <div class="card">Show 2</div>
        <div class="card">Show 3</div>
        <div class="card">Show 4</div>
    </div>
</section>

<footer>
    © 2026 EventHub
</footer>

<script src="script.js"></script>
</body>
</html>
